apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: elasticsearch-clusterrolebinding-sa
spec:
  template: |
    {{- if eq .Values.activeActive.enable true}}
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    metadata:
      name: {{ .Globe.Name }}-sa
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: {{ .Globe.Name }}
    subjects:
      - kind: ServiceAccount
        name: {{ .Globe.Name }}-sa
        namespace: {{ .Globe.Namespace }}
    {{- end }}