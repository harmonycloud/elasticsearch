apiVersion: middleware.cn/v1
kind: MiddlewareBaseline
metadata:
  name: elasticsearch-cluster
  annotations:
    baselineName: "集群模式"
    description: "集群模式基线,包含核心功能和必要依赖,适用于快速部署和基本应用场景,稳定可靠,易于扩展和维护."
spec:
  operatorBaseline:
    name: elasticsearch-operator-standard
    gvkName: v1alpha1
  necessary:
    version: "7.16.3"
    repository: ""
    password: "Hc@Cloud01"
    elasticsearchPort:
      exporter: "19114"
      http: "9200"
      kibana: "5200"
      tcp: "9300"
    resource:
      client:
        limits:
          cpu: "1"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "4Gi"
      cold:
        limits:
          cpu: "1"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "4Gi"
      data:
        limits:
          cpu: "1"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "4Gi"
      kibana:
        limits:
          cpu: "500m"
          memory: "1Gi"
        requests:
          cpu: "500m"
          memory: "1Gi"
      master:
        limits:
          cpu: "1"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "4Gi"
        replaces: "3"
        volume:
          size: ""
          storageClass: ""
  preActions:
    - name: pre-elasticsearch-logging
      parameters:
        fileLogging: true
        stdoutLogging: true
      exposed: true
    - name: pre-elasticsearch-active-active
      parameters: {}
      exposed: false
    - name: pre-elasticsearch-hostnetwork
      parameters:
        hostNetwork: false
      exposed: true
    - name: pre-elasticsearch-tolerations
      parameters:
        tolerations: []
      exposed: true
    - name: pre-elasticsearch-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: {}
        activeActive: false
      exposed: true
    - name: pre-elasticsearch-kibana-tolerations
      parameters:
        tolerations: []
      exposed: true
    - name: pre-elasticsearch-kibana-affinity
      parameters:
        nodeAffinity: {}
      exposed: true
    - name: pre-elasticsearch-exporter-tolerations
      parameters:
        tolerations: []
      exposed: true
    - name: pre-elasticsearch-exporter-affinity
      parameters:
        nodeAffinity: {}
      exposed: true
  parameters:
    clusterMode: simple
    clusterName: "{{ .Globe.Name }}"
    checkHealthConfigMap: "{{ .Globe.Name }}-checkhealth-config"
    elasticKibanaConfigMap: "{{ .Globe.Name }}-kibana-config"
    elasticSearchConfigMap: "{{ .Globe.Name }}-es-config"
    esExporterPort: "{{ .Necessary.elasticsearchPort.exporter }}"
    esHttpPort: "{{ .Necessary.elasticsearchPort.http }}"
    esKibanaPort: "{{ .Necessary.elasticsearchPort.kibana }}"
    esTcpPort: "{{ .Necessary.elasticsearchPort.tcp }}"
    elasticPass: "{{ .Necessary.password }}"
    kibanaImage: '{{ .Necessary.repository }}/kibana:{{ if contains "6.8" .Necessary.version }}6.8.10{{ else if eq "7.16.2" .Necessary.version }}7.16.2{{ else if eq "7.16.3" .Necessary.version }}7.16.3{{ else if eq "8.11.3" .Necessary.version }}8.11.3{{ else }}8.13.4{{ end }}'
    elasticBusyImage: "{{ .Necessary.repository }}/busybox:1.0"
    kibanaReplicas: 1
    masterReplaces: "{{ .Necessary.elasticsearchResource.master.replaces }}"
    dataReplaces:
    clientReplaces:
    coldReplaces:
    totalReplaces: "{{ .Necessary.elasticsearchResource.master.replaces }}"
    pod:
      - env:
          - name: PathRepo
            value: /data/elastic/{ClusterName}/{PodName}/data/data_back
        initImage: "{{ .Necessary.repository }}/es-init:v1.7.0"
        podAntiAffinityTopologKey: kubernetes.io/hostname
        podAntiAffinity: soft
        storage:
          clientSize: 5Gi
          coldSize: 5Gi
          dataSize: 5Gi
          masterSize: 5Gi
        middlewareImage: '{{ .Necessary.repository }}/elastic:{{ if contains "6.8" .Necessary.version }}6.8.22-466e79{{ else if eq "7.16.2" .Necessary.version }}7.16.2-466e79{{ else if eq "7.16.3" .Necessary.version }}7.16.3-466e79{{ else if eq "8.11.3" .Necessary.version }}8.11.3-466e79{{ else }}8.13.4-466e79{{ end }}'
        monitorImage: "{{ .Necessary.repository }}/es-exporter:v1.6.0"
        hostNetwork: false
        resources:
          client:
            limits:
              cpu: '"{{ .Necessary.resource.client.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.client.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.client.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.client.requests.memory }}"'
          cold:
            limits:
              cpu: '"{{ .Necessary.resource.cold.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.cold.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.cold.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.cold.requests.memory }}"'
          data:
            limits:
              cpu: '"{{ .Necessary.resource.data.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.data.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.data.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.cold.requests.memory }}"'
          kibana:
            limits:
              cpu: '"{{ .Necessary.resource.kibana.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.kibana.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.kibana.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.kibana.requests.memory }}"'
          master:
            limits:
              cpu: '"{{ .Necessary.resource.master.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.master.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.master.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.master.requests.memory }}"'
        updateStrategy: { }
    projectId: a9927d1581674f27
    repository: "{{ .Necessary.repository }}"
    type: simple
    updateStrategy: { }
    version: '{{ if contains "6.8" .Necessary.version }}6.8.22{{ else if eq "7.16.2" .Necessary.version }}7.16.2{{ else if eq "7.16.3" .Necessary.version }}7.16.3{{ else }}8.11.3{{ end }}'
    esMaster:
    esData:
    esCold:
    esClient:
    statefulset:
      spec:
        updateStrategy:
          type: RollingUpdate
        template:
          metadata:
          spec:
            initContainers:
              - env:
                  - name: NodeName
                    valueFrom:
                      fieldRef:
                        apiVersion: v1
                        fieldPath: spec.nodeName
                name: "{{ .Globe.Name }}-init"
    deploymentComponent:
      kibana:
        spec:
          template:
            metadata:
            spec:
      exporter:
        spec:
          template:
            metadata:
            spec:
    volumeClaimTemplates:
      - metadata:
          creationTimestamp: null
          name: es-data
        spec:
          accessModes:
            - ReadWriteOnce
          dataSource: null
          resources:
            requests:
              storage: "{{ .Necessary.resource.master.volume.size }}"
          storageClassName: "{{ .Necessary.resource.master.volume.storageClass }}"
        status: { }
    volumes: { }
  configurations:
    - name: elasticsearch-alertrule
      values: { }
    - name: elasticsearch-clusterrole
      values: { }
    - name: elasticsearch-clusterrolebinding
      values: { }
    - name: elasticsearch-clusterrolebinding-sa
      values:
        activeActive:
          enable: false
    - name: elasticsearch-serviceaccount
      values: { }
    - name: elasticsearch-serviceaccount-sa
      values:
        activeActive:
          enable: false
    - name: elasticsearch-connection-credential
      values:
        elasticPassword: "{{ .Parameters.elasticPass }}"
    - name: elasticsearch-checkhealth-config
      values:
        elasticPassword: "{{ .Parameters.elasticPass }}"
        port:
          esHttpPort: "{{ .Parameters.esHttpPort }}"
    - name: elasticsearch-es-config
      values:
        args: { }
        version: "{{ .Parameters.version }}"
        port:
          esHttpPort: "{{ .Parameters.esHttpPort }}"
          esTcpPort: "{{ .Parameters.esTcpPort }}"
        additionArgs: { }
    - name: elasticsearch-kibana-config
      values:
        port:
          esKibanaPort: "{{ .Parameters.esKibanaPort }}"
        version: "{{ .Parameters.version }}"
        elasticPassword: "{{ .Parameters.elasticPass }}"
    - name: elasticsearch-servicemonitor
      values: { }
