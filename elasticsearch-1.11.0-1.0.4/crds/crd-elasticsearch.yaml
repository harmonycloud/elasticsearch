apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: crd-elasticsearch
spec:
  template: |
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: esclusters.es.middleware.hc.cn
      labels:
        MiddlewareCluster: escluster
    spec:
      conversion:
        strategy: None
      group: es.middleware.hc.cn
      names:
        kind: ESCluster
        listKind: ESClusterList
        plural: esclusters
        shortNames:
        - esc
        singular: escluster
      preserveUnknownFields: false
      scope: Namespaced
      versions:
      - name: v1alpha1
        served: true
        storage: true
        schema:
          openAPIV3Schema:
            type: object
            x-kubernetes-preserve-unknown-fields: true

