apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "elasticsearch.fullname" . }}-job
  labels:
    {{- include "elasticsearch.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "elasticsearch.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole 
  name: {{ include "elasticsearch.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "elasticsearch.fullname" . }}-job
  namespace: {{ .Release.Namespace | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "elasticsearch.fullname" . }}
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - patch
  - update
  - watch
  - create
- apiGroups:
  - ""
  resources:
  - endpoints
  verbs:
  - get
  - list
  - patch
  - update
  - watch
  - create
- apiGroups:
  - batch
  resources:
  - cronjobs
  verbs:
  - get
  - list
  - patch
  - update
  - watch
  - create
  - delete
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
    - es.middleware.hc.cn
  resources:
    - essnapshotrestores
    - essnapshotrestores/status
    - escluster
  verbs:
    - get
    - list
    - patch
    - update
    - watch
    - create
- apiGroups:
    - ""
  resources:
    - nodes
  verbs:
    - get
    - list

