{{- if eq .Values.activeActive.enable true}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "elasticsearch.fullname" . }}-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "elasticsearch.fullname" . }}-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "elasticsearch.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "elasticsearch.fullname" . }}-sa
    namespace: {{ .Release.Namespace | quote }}
{{- end }}