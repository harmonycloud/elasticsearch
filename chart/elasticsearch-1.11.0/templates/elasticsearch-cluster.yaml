apiVersion: es.middleware.hc.cn/v1alpha1
kind: ESCluster
metadata:
  annotations:
    OperationType: Create
    developerPass: es
  name: {{ include "elasticsearch.fullname" . }}
spec:
  clusterMode: {{ .Values.cluster.mode }}
{{- if not .Values.clusterName }}
  clusterName: {{ include "elasticsearch.fullname" . }}
{{- else }}
  clusterName: {{ .Values.clusterName }}
{{- end }}
  checkHealthConfigMap: {{ include "elasticsearch.fullname" . }}-checkhealth-config
  elasticKibanaConfigMap: {{ include "elasticsearch.fullname" . }}-kibana-config
  elasticSearchConfigMap: {{ include "elasticsearch.fullname" . }}-es-config
  esExporterPort: {{ .Values.port.esExporterPort }}
  esHttpPort: {{ .Values.port.esHttpPort }}
  esKibanaPort: {{ .Values.port.esKibanaPort }}
  esTcpPort: {{ .Values.port.esTcpPort }}
  {{- if .Values.encodePassword }}
  secretName: {{ .Release.Name }}-credential
  elasticPass: {{ .Values.encodePassword | quote}}
  {{- else }}
  elasticPass: {{ .Values.elasticPassword | quote}}
  {{- end }}
  {{- if .Values.kibanaPassword }}
  kibanaPass: {{ .Values.kibanaPassword }}
  {{- end}}
  {{- with .Values.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if contains "6.8" .Values.version }}
  kibanaImage: {{ .Values.image.repository }}/kibana:{{ .Values.image.kibanaImageTag_6_8_10 }}
{{- else if eq "7.16.2" .Values.version }}
  kibanaImage: {{ .Values.image.repository }}/kibana:{{ .Values.image.kibanaImageTag_7_16_2 }}
{{- else if eq "7.16.3" .Values.version }}
  kibanaImage: {{ .Values.image.repository }}/kibana:{{ .Values.image.kibanaImageTag_7_16_3 }}
{{- else if eq "8.11.3" .Values.version }}
  kibanaImage: {{ .Values.image.repository }}/kibana:{{ .Values.image.kibanaImageTag_8_11_3 }}
{{- else }}
  kibanaImage: {{ .Values.image.repository }}/kibana:{{ .Values.image.kibanaImageTag_8_13_4 }}
{{- end }}
  elasticBusyImage: {{ .Values.image.repository }}/busybox:{{ .Values.image.busyImageTag }}
  kibanaReplicas: {{ .Values.kibanaReplicas }}
  masterReplaces: {{ .Values.cluster.masterReplacesCount }}
  dataReplaces: {{ .Values.cluster.dataReplacesCount }}
  clientReplaces: {{ .Values.cluster.clientReplacesCount }}
  coldReplaces: {{ .Values.cluster.coldReplacesCount }}
  totalReplaces: {{ add .Values.cluster.masterReplacesCount .Values.cluster.dataReplacesCount .Values.cluster.clientReplacesCount .Values.cluster.coldReplacesCount  }}
  pod:
  - env:
  {{- if ((((.Values.logging).collection).stdout).enabled)}}
    - name: aliyun_logs_middlewarestdout
      value: stdout
    - name: aliyun_logs_middlewarestdout_tags
      value: middleware_name={{ include "elasticsearch.fullname" . }}
  {{- end}}
  {{- if ((((.Values.logging).collection).filelog).enabled)}}
    - name: aliyun_logs_middlewarelogstash
      value: /data/elastic/{{ include "elasticsearch.fullname" . }}/**/log/*.log
    - name: aliyun_logs_middlewarelogstash_tags
      value: middleware_name={{ include "elasticsearch.fullname" . }}
  {{- end}}
    - name: PathRepo
      value: {{ .Values.args.path_repo | default "/data/elastic/{ClusterName}/{PodName}/data/data_back" }}
    initImage: {{ .Values.image.repository }}/es-init:{{ .Values.image.initImageTag }}
    podAntiAffinityTopologKey: {{ .Values.podAntiAffinityTopologKey }}
    podAntiAffinity: {{ .Values.podAntiAffinity }}
    {{- with .Values.storage }}
    storage:
    {{- toYaml .| nindent 6 }}
    {{- end }}
    {{- with .Values.esJavaOpts }}
    jvm:
    {{- toYaml .| nindent 6 }}
    {{- end }}
	{{- with .Values.extraVolumeMounts }}
    extraVolumeMounts:
    {{- toYaml .| nindent 6 }}
    {{- end }}
  {{- if contains "6.8" .Values.version }}
    middlewareImage: {{ .Values.image.repository }}/elastic:{{ .Values.image.elasticImageTag_6_8_22 }}
  {{- else if eq "7.16.2" .Values.version}}
    middlewareImage: {{ .Values.image.repository }}/elastic:{{ .Values.image.elasticImageTag_7_16_2 }}
  {{- else if eq "7.16.3" .Values.version }}
    middlewareImage: {{ .Values.image.repository }}/elastic:{{ .Values.image.elasticImageTag_7_16_3 }}
  {{- else if eq "8.11.3" .Values.version }}
    middlewareImage: {{ .Values.image.repository }}/elastic:{{ .Values.image.elasticImageTag_8_11_3 }}
  {{- else }}
    middlewareImage: {{ .Values.image.repository }}/elastic:{{ .Values.image.elasticImageTag_8_13_4 }}
  {{- end }}
    monitorImage: {{ .Values.image.repository }}/es-exporter:{{ .Values.image.exporterImageTag }}
    hostNetwork: {{ default false .Values.hostNetwork }}
    resources:
      {{- toYaml .Values.resources | nindent 6 }}
    updateStrategy: {}
  projectId: a9927d1581674f27
  repository: {{ .Values.image.repository }}
  type: {{ .Values.cluster.mode }}
  updateStrategy: {}
{{- if contains "6.8" .Values.version }}
  version: "6.8.22"
{{- else if eq "7.16.2" .Values.version}}
  version: "7.16.2"
{{- else if eq "7.16.3" .Values.version }}
  version: "7.16.3"
{{- else }}
  version: "8.11.3"
{{- end }}
  esMaster:
  {{- include "middlware.topologyDistribution.master" . | indent 4 }}
  esData:
  {{- include "middlware.topologyDistribution.data" . | indent 4 }}
  esCold:
  {{- include "middlware.topologyDistribution.cold" . | indent 4 }}
  esClient:
  {{- include "middlware.topologyDistribution.client" . | indent 4 }}
  statefulset:
    spec:
      updateStrategy:
        type: RollingUpdate
      template:
        metadata:
          {{- with .Values.annotations }}
          annotations:
          {{- toYaml . | nindent 13 }}
          {{- end }}
          {{- with .Values.labels }}
          labels:
          {{- toYaml . | nindent 13 }}
          {{- end }}
        spec:
          initContainers:
          - env:
            - name: NodeName
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            {{- if eq .Values.activeActive.enable true }}
            - name: ActiveActive
              value: "true"
            {{- end }}
            name: {{ include "elasticsearch.fullname" . }}-init
        {{- if eq .Values.activeActive.enable true }}
          serviceAccountName: {{ include "elasticsearch.fullname" . }}-sa
        {{- end }}
        {{- with .Values.statefulSetConfiguration }}
        {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.tolerations }}
          tolerations:
        {{- toYaml . | nindent 13 }}
        {{- end }}
  deploymentComponent:
    kibana:
      spec:
        template:
          metadata:
            {{- with .Values.annotations }}
            annotations:
            {{- toYaml . | nindent 15 }}
            {{- end }}
            {{- with .Values.labels }}
            labels:
            {{- toYaml . | nindent 15 }}
            {{- end }}
          spec:
          {{- with .Values.kibanaDeploymentConfiguration }}
          {{- toYaml . | nindent 13 }}
          {{- end }}
          {{- if empty .Values.kibanaDeploymentConfiguration }}
          {{- with .Values.tolerations }}
            tolerations:
          {{- toYaml . | nindent 15 }}
          {{- end }}
          {{- with .Values.nodeAffinity }}
            affinity:
              nodeAffinity:
               {{- toYaml . | nindent 16 }}
          {{- end }}
          {{- end }}
    exporter:
      spec:
        template:
          metadata:
            {{- with .Values.annotations }}
            annotations:
            {{- toYaml . | nindent 15 }}
            {{- end }}
            {{- with .Values.labels }}
            labels:
            {{- toYaml . | nindent 15 }}
            {{- end }}
          spec:
          {{- with .Values.exporterDeploymentConfiguration }}
          {{- toYaml . | nindent 15 }}
          {{- end }}
          {{- if empty .Values.exporterDeploymentConfiguration }}
          {{- with .Values.tolerations }}
            tolerations:
          {{- toYaml . | nindent 15 }}
          {{- end }}
          {{- with .Values.nodeAffinity }}
            affinity:
              nodeAffinity:
                {{- toYaml . | nindent 16 }}
          {{- end }}
          {{- end }}
  volumeClaimTemplates:
  - metadata:
      creationTimestamp: null
      name: es-data
    spec:
      accessModes:
      - ReadWriteOnce
      dataSource: null
      resources:
        requests:
          storage: {{ .Values.storageSize }}
      {{- if .Values.storageClassName }}
      storageClassName: {{ .Values.storageClassName }}
      {{- end}}
    status: {}
  volumes: {}
  {{- with .Values.extraVolumes }}
  extraVolumes:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- if .Values.customVolumes }}
  customVolumes:
    {{- toYaml .Values.customVolumes | nindent 4 }}
  {{- end }}
