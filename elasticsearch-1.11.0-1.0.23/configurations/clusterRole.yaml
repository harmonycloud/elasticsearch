apiVersion: middleware.cn/v1
kind: MiddlewareConfiguration
metadata:
  name: elasticsearch-clusterrole
spec:
  template: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: {{ .Globe.Name }}
    rules:
    - apiGroups:
      - apiextensions.k8s.io
      resources:
      - customresourcedefinitions
      verbs:
      - get
      - list
      - patch
      - update
      - watch
      - create
    - apiGroups:
      - ""
      resources:
      - endpoints
      verbs:
      - get
      - list
      - patch
      - update
      - watch
      - create
    - apiGroups:
      - batch
      resources:
      - cronjobs
      verbs:
      - get
      - list
      - patch
      - update
      - watch
      - create
      - delete
    - apiGroups:
      - ""
      resources:
      - pods
      verbs:
      - get
      - list
      - patch
      - update
      - watch
    - apiGroups:
        - es.middleware.hc.cn
      resources:
        - essnapshotrestores
        - essnapshotrestores/status
        - escluster
      verbs:
        - get
        - list
        - patch
        - update
        - watch
        - create
    - apiGroups:
        - ""
      resources:
        - nodes
      verbs:
        - get
        - list

