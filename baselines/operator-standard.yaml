apiVersion: middleware.cn/v1
kind: MiddlewareOperatorBaseline
metadata:
  name: elasticsearch-operator-standard
  annotations:
    baselineName: "Standard"
    description: "Standard Baseline,incorporating core functionality and essential dependencies, is tailored for rapid deployment and fundamental application scenarios. It delivers stable and reliable performance, and is designed for ease of extension and maintenance."
spec:
  gvks:
    - name: v1alpha1
      group: "es.middleware.hc.cn"
      version: "v1alpha1"
      kind: "ESCluster"
  globe:
    repository: "10.10.101.172:443"
    project: "middleware"
#    resource:
#      limits:
#        cpu: "500m"
#        memory: "500Mi"
#      requests:
#        cpu: "100m"
#        memory: "250Mi"
  preActions:
    - name: pre-elasticsearch-operator-alertrule-labels
      parameters:
        labels: {}
      exposed: false
    - name: pre-elasticsearch-operator-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: [ ]
      exposed: true
    - name: pre-elasticsearch-operator-tolerations
      parameters:
        tolerations: [ ]
      exposed: true
  permissionScope: "Cluster"
  permissions:
    - serviceAccountName: "{{ .Globe.Name }}-elasticsearch-operator"
      rules:
        - apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - endpoints
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - statefulsets
            - deployments
            - daemonsets
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - services
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - apps
          resources:
            - controllerrevisions
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - events
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods
          verbs:
            - get
            - list
            - patch
            - update
            - watch
        - apiGroups:
            - es.middleware.hc.cn
          resources:
            - esclusters
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - pods/exec
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - ""
          resources:
            - nodes
            - secrets
            - configmaps
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - es.middleware.hc.cn
          resources:
            - esclusters/status
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
        - apiGroups:
            - coordination.k8s.io
          resources:
            - leases
          verbs:
            - get
            - list
            - patch
            - update
            - watch
            - create
  deployment:
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: elasticsearch-operator
          app.kubernetes.io/instance: "{{ .Globe.Name }}"
      strategy:
        rollingUpdate:
          maxSurge: 25%
          maxUnavailable: 25%
        type: RollingUpdate
      template:
        metadata:
          labels:
            app.kubernetes.io/name: elasticsearch-operator
            app.kubernetes.io/instance: "{{ .Globe.Name }}"
        spec:
          containers:
            - name: elasticsearch-operator
              image: '{{ if ne .Globe.repository "" }}{{ .Globe.repository }}/{{ end }}{{ .Globe.project }}/operator-manager:v1.11.1'
              args:
                - -leader-elect=true
              imagePullPolicy: IfNotPresent
              env:
                - name: TZ
                  value: Asia/Shanghai
                - name: CRD_GROUP
                  value: harmonycloud
              ports:
                - name: http
                  containerPort: 80
                  protocol: TCP
              livenessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              readinessProbe:
                failureThreshold: 3
                httpGet:
                  path: /healthz
                  port: 8081
                  scheme: HTTP
                initialDelaySeconds: 5
                periodSeconds: 5
                successThreshold: 1
                timeoutSeconds: 5
              resources:
                limits:
                  cpu: "200m"
                  memory: "512Mi"
                requests:
                  cpu: "100m"
                  memory: "256Mi"
          serviceAccount: "{{ .Globe.Name }}-elasticsearch-operator"
  configurations:
    - name: "crd-elasticsearch"
      values: { }
    - name: "elasticsearch-operator-alertrule"
      values: { }
    - name: "elasticsearch-operator-dashboard"
      values: { }
