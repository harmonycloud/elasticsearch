apiVersion: middleware.cn/v1
kind: MiddlewareBaseline
metadata:
  name: elasticsearch-cluster
  annotations:
    OperationType: Create
    developerPass: es
    baselineName: "集群模式"
    description: "集群模式基线,包含核心功能和必要依赖,适用于快速部署和基本应用场景,稳定可靠,易于扩展和维护."
spec:
  operatorBaseline:
    name: elasticsearch-operator-standard
    gvkName: v1alpha1
  necessary:
    version: '{"type":"version","label":"版本","required":true,"default":"7.16.3"}'
    repository: ""
    password: '{"type":"password","label":"管理员账号密码","required":true,"description":"MySQL 管理员的初始密码，需包含大小写字母、数字和特殊字符","pattern":"^(?=.*[A-Z])(?=.*[a-z])(?=.*\\d)(?=.*[@$!%*#?&])[A-Za-z\\d@$!%*#?&]{8,}$","placeholder":"输入管理员账户密码","default":"Hc@Cloud01"}'
    #    elasticsearchPort:
    #      exporter: "19114"
    #      http: "9200"
    #      kibana: "5200"
    #      tcp: "9300"
    resource:
      master:
        limits:
          cpu: '{"type":"string","label":"CPU","required":true,"description":"请输入自定义配额,单位为Core","placeholder":"请输入自定义配额,单位为Core","default":"1"}'
          memory: '{"type":"string","label":"内存","required":true,"description":"请输入自定义配额,单位为Gi","placeholder":"请输入自定义配额,单位为Gi","default":"4"}'
        requests:
          cpu: '{"type":"string","label":"CPU","required":true,"description":"请输入自定义配额,单位为Core","placeholder":"请输入自定义配额,单位为Core","default":"1"}'
          memory: '{"type":"string","label":"内存","required":true,"description":"请输入自定义配额,单位为Gi","placeholder":"请输入自定义配额,单位为Gi","default":"4"}'
        replicas: '{"type":"int","label":"实例数","required":true,"description":"节点数量，建议至少2个以保证高可用","default":3,"pattern":"^[1-9]\\d*$","placeholder":"请输入实例数"}'
        volume:
          size: '{"type":"int","label":"存储大小","required":true,"description":"请输入存储大小","pattern":"^[1-9]\\d*$","placeholder":"请输入存储大小"}'
          storageClass: '{"type":"storageClass","label":"存储类","required":true,"description":"请选择存储","placeholder":"请选择存储"}'
  preActions:
    - name: pre-elasticsearch-alertrule-labels
      parameters:
        labels: {}
      exposed: false
    - name: pre-elasticsearch-logging
      parameters:
        fileLogging: true
        stdoutLogging: true
      exposed: true
    - name: pre-elasticsearch-active-active
      parameters: {}
      exposed: false
    #    - name: pre-elasticsearch-hostnetwork
    #      parameters:
    #        hostNetwork: false
    #      exposed: true
    - name: pre-elasticsearch-tolerations
      parameters:
        tolerations: []
      exposed: true
    - name: pre-elasticsearch-affinity
      parameters:
        podAntiAffinityTopologKey: "kubernetes.io/hostname"
        podAntiAffinity: "soft"
        nodeAffinity: {}
        activeActive: false
      exposed: true
  #    - name: pre-elasticsearch-kibana-tolerations
  #      parameters:
  #        tolerations: []
  #      exposed: true
  #    - name: pre-elasticsearch-kibana-affinity
  #      parameters:
  #        nodeAffinity: {}
  #      exposed: true
  #    - name: pre-elasticsearch-exporter-tolerations
  #      parameters:
  #        tolerations: []
  #      exposed: true
  #    - name: pre-elasticsearch-exporter-affinity
  #      parameters:
  #        nodeAffinity: {}
  #      exposed: true
  parameters:
    clusterMode: simple
    clusterName: "{{ .Globe.Name }}"
    checkHealthConfigMap: "{{ .Globe.Name }}-checkhealth-config"
    elasticKibanaConfigMap: "{{ .Globe.Name }}-kibana-config"
    elasticSearchConfigMap: "{{ .Globe.Name }}-es-config"
    esExporterPort: 19114
    esHttpPort: 9200
    esKibanaPort: 5200
    esTcpPort: 9300
    elasticPass: "{{ .Necessary.password }}"
    kibanaImage: '{{ .Necessary.repository }}/kibana:{{ if contains "6.8" .Necessary.version }}6.8.10{{ else if eq "7.16.2" .Necessary.version }}7.16.2{{ else if eq "7.16.3" .Necessary.version }}7.16.3{{ else if eq "8.11.3" .Necessary.version }}8.11.3{{ else }}8.13.4{{ end }}'
    elasticBusyImage: "{{ .Necessary.repository }}/busybox:1.0"
    kibanaReplicas: 1
    masterReplaces: "{{ .Necessary.resource.master.replicas }}"
    dataReplaces:
    clientReplaces:
    coldReplaces:
    totalReplaces: "{{ .Necessary.resource.master.replicas }}"
    pod:
      - env:
          - name: PathRepo
            value: /data/elastic/{ClusterName}/{PodName}/data/data_back
        initImage: "{{ .Necessary.repository }}/es-init:v1.7.0"
        podAntiAffinityTopologKey: kubernetes.io/hostname
        podAntiAffinity: soft
        storage:
          dataSize: 5Gi
          clientSize: 5Gi
          coldSize: 5Gi
          masterSize: "{{ .Necessary.resource.master.volume.size }}"
          masterClass: "{{ .Necessary.resource.master.volume.storageClass }}"
        middlewareImage: '{{ .Necessary.repository }}/elastic:{{ if contains "6.8" .Necessary.version }}6.8.22-466e79{{ else if eq "7.16.2" .Necessary.version }}7.16.2-466e79{{ else if eq "7.16.3" .Necessary.version }}7.16.3-466e79{{ else if eq "8.11.3" .Necessary.version }}8.11.3-466e79{{ else }}8.13.4-466e79{{ end }}'
        monitorImage: "{{ .Necessary.repository }}/es-exporter:v1.6.0"
        hostNetwork: false
        resources:
          cold:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 4Gi
          client:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 4Gi
          data:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: "1"
              memory: 4Gi
          kibana:
            limits:
              cpu: "500m"
              memory: 1Gi
            requests:
              cpu: "500m"
              memory: 1Gi
          master:
            limits:
              cpu: '"{{ .Necessary.resource.master.limits.cpu }}"'
              memory: '"{{ .Necessary.resource.master.limits.memory }}"'
            requests:
              cpu: '"{{ .Necessary.resource.master.requests.cpu }}"'
              memory: '"{{ .Necessary.resource.master.requests.memory }}"'
        updateStrategy: {}
    projectId: a9927d1581674f27
    repository: "{{ .Necessary.repository }}"
    type: simple
    updateStrategy: {}
    version: '{{ if contains "6.8" .Necessary.version }}6.8.22{{ else if eq "7.16.2" .Necessary.version }}7.16.2{{ else if eq "7.16.3" .Necessary.version }}7.16.3{{ else }}8.11.3{{ end }}'
    esMaster:
    esData:
    esCold:
    esClient:
    statefulset:
      spec:
        updateStrategy:
          type: RollingUpdate
        template:
          metadata:
          spec:
            initContainers:
              - env:
                  - name: NodeName
                    valueFrom:
                      fieldRef:
                        apiVersion: v1
                        fieldPath: spec.nodeName
                name: "{{ .Globe.Name }}-init"
    deploymentComponent:
      kibana:
        spec:
          template:
            metadata:
            spec:
      exporter:
        spec:
          template:
            metadata:
            spec:
    volumeClaimTemplates:
      - metadata:
          creationTimestamp: null
          name: es-data
        spec:
          accessModes:
            - ReadWriteOnce
          dataSource: null
          resources:
            requests:
              storage: "0"
        status: {}
    volumes: {}
  configurations:
    - name: elasticsearch-alertrule
      values: {}
    - name: elasticsearch-clusterrole
      values: {}
    - name: elasticsearch-clusterrolebinding
      values: {}
    - name: elasticsearch-clusterrolebinding-sa
      values:
        activeActive:
          enable: false
    - name: elasticsearch-serviceaccount
      values: {}
    - name: elasticsearch-serviceaccount-sa
      values:
        activeActive:
          enable: false
    - name: elasticsearch-connection-credential
      values:
        elasticPassword: "{{ .Parameters.elasticPass }}"
    - name: elasticsearch-checkhealth-config
      values:
        elasticPassword: "{{ .Parameters.elasticPass }}"
        port:
          esHttpPort: "{{ .Parameters.esHttpPort }}"
    - name: elasticsearch-es-config
      values:
        args: {}
        version: "{{ .Parameters.version }}"
        port:
          esHttpPort: "{{ .Parameters.esHttpPort }}"
          esTcpPort: "{{ .Parameters.esTcpPort }}"
        additionArgs: {}
    - name: elasticsearch-kibana-config
      values:
        port:
          esKibanaPort: "{{ .Parameters.esKibanaPort }}"
        version: "{{ .Parameters.version }}"
        elasticPassword: "{{ .Parameters.elasticPass }}"
    - name: elasticsearch-servicemonitor
      values: {}
